<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#efe2d5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Field Guide">
  <title>DC + Shenandoah Field Guide</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6efe6;
      --bg-deep: #efe2d5;
      --surface: rgba(255, 251, 246, 0.78);
      --surface-strong: rgba(255, 250, 244, 0.92);
      --ink: #2c221b;
      --ink-soft: #4d3d33;
      --line: rgba(103, 81, 67, 0.15);
      --shadow: 0 24px 60px rgba(101, 73, 52, 0.14);
      --chip: rgba(255, 255, 255, 0.55);
      --accent: #b86757;
      --accent-deep: #8d4e42;
      --ambient: rgba(231, 186, 163, 0.45);
      --ambient-two: rgba(186, 214, 203, 0.32);
      --card-a: rgba(250, 227, 214, 0.92);
      --card-b: rgba(244, 238, 226, 0.8);
      --locked: #8d4e42;
      --soft: #7f6a53;
      --floating: #54716a;
      --easy: #5f7a5d;
      --moderate: #9c6d38;
      --packed: #a24c49;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161412;
        --bg-deep: #1d1a17;
        --surface: rgba(35, 30, 27, 0.76);
        --surface-strong: rgba(43, 37, 33, 0.9);
        --ink: #f4ece3;
        --ink-soft: #e6d9cd;
        --line: rgba(255, 234, 216, 0.11);
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
        --chip: rgba(255, 248, 239, 0.07);
        --accent: #efb19d;
        --accent-deep: #f4c6b7;
        --ambient: rgba(170, 112, 92, 0.28);
        --ambient-two: rgba(88, 123, 112, 0.2);
        --card-a: rgba(86, 58, 49, 0.34);
        --card-b: rgba(52, 46, 42, 0.2);
        --locked: #f0c7b9;
        --soft: #dfceb8;
        --floating: #b7d8d1;
        --easy: #b8d6b2;
        --moderate: #f1c483;
        --packed: #efaaa4;
      }

      .day-card {
        color: #2f241d;
        background:
          linear-gradient(158deg, var(--card-a), var(--card-b) 58%, rgba(235, 223, 216, 0.94) 100%);
        border-color: rgba(114, 85, 71, 0.16);
        box-shadow:
          0 18px 42px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }

      .day-card.is-focused {
        box-shadow:
          0 0 0 2px rgba(190, 117, 92, 0.24),
          0 22px 48px rgba(0, 0, 0, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }

      .day-crest,
      .section,
      .anchor-item,
      details.entry {
        background:
          linear-gradient(180deg, rgba(255, 252, 248, 0.5), rgba(255, 247, 241, 0.4));
        border-color: rgba(114, 85, 71, 0.14);
      }

      details.entry[open] {
        background:
          linear-gradient(180deg, rgba(255, 252, 248, 0.62), rgba(255, 247, 241, 0.48));
      }

      .tiny-pill,
      .badge,
      .tag {
        background: rgba(255, 255, 255, 0.32);
        border-color: rgba(114, 85, 71, 0.14);
      }

      .map-row a {
        color: #9a5f4f;
        background: rgba(255, 253, 250, 0.52);
        border-color: rgba(154, 95, 79, 0.22);
      }

      .day-label,
      .section h2,
      .section h3,
      .day-crest svg,
      .anchor-time {
        color: #9f6554;
      }

      .day-date,
      .day-blurb,
      .moment-count,
      .anchor-note,
      .soft-note,
      .tiny-pill,
      .tag,
      .entry-body,
      .badge.category {
        color: #5c4940;
      }

      .entry-time,
      .day-title,
      .anchor-name,
      .entry-name,
      .moment-title {
        color: #2f241d;
        text-shadow: none;
      }

      .chevron {
        border-right-color: #6f5b50;
        border-bottom-color: #6f5b50;
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, var(--ambient), transparent 34rem),
        radial-gradient(circle at 90% 15%, var(--ambient-two), transparent 28rem),
        linear-gradient(180deg, var(--bg), var(--bg-deep));
      transition: background 380ms ease, color 240ms ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.28;
      mix-blend-mode: soft-light;
    }

    .app-shell {
      width: min(100%, 32rem);
      margin: 0 auto;
      padding:
        max(1rem, env(safe-area-inset-top))
        1rem
        max(1.75rem, env(safe-area-inset-bottom))
        1rem;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 10;
      padding-top: 0.35rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .hero-panel {
      padding: 1.1rem 1rem 1rem;
      border: 1px solid var(--line);
      border-radius: 1.6rem;
      background: linear-gradient(180deg, var(--surface-strong), var(--surface));
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      inset: auto -2rem -2rem auto;
      width: 7.5rem;
      height: 7.5rem;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.34), transparent 68%);
      opacity: 0.9;
      pointer-events: none;
    }

    .hero-panel > * {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      margin: 0 0 0.35rem;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent-deep);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(2rem, 8vw, 2.7rem);
      line-height: 0.96;
      letter-spacing: -0.03em;
    }

    .toolbar {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .toolbar button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.8rem 1rem;
      font: inherit;
      font-size: 0.93rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      min-height: 2.8rem;
      flex: 1 1 9rem;
      justify-content: center;
    }

    .toolbar button:active {
      transform: scale(0.98);
    }

    .toolbar button.is-active {
      background: rgba(184, 103, 87, 0.12);
      border-color: rgba(184, 103, 87, 0.22);
      color: var(--accent-deep);
    }

    .status-note {
      margin-top: 0.95rem;
      padding: 0.85rem 0.95rem;
      border-radius: 1.1rem;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.26);
      color: var(--ink-soft);
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.45;
    }

    .dot-nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(3.1rem, 1fr));
      gap: 0.65rem;
      margin-top: 1rem;
      position: relative;
      z-index: 2;
    }

    .dot-button {
      appearance: none;
      border: none;
      background: transparent;
      color: inherit;
      padding: 0;
      text-align: center;
      min-height: 3.4rem;
    }

    .dot-core {
      width: 0.88rem;
      height: 0.88rem;
      border-radius: 50%;
      margin: 0 auto 0.38rem;
      border: 1px solid rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.3);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.65);
      transition: transform 220ms ease, background 220ms ease, box-shadow 220ms ease;
    }

    .dot-button span {
      display: block;
      font-size: 0.74rem;
      color: var(--ink-soft);
      font-weight: 600;
      line-height: 1.2;
    }

    .dot-button.is-current .dot-core {
      transform: scale(1.36);
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(184, 103, 87, 0.14);
      border-color: transparent;
    }

    .guide {
      padding-top: 1rem;
    }

    .guide.is-browse {
      display: grid;
      gap: 1rem;
    }

    .day-card {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      border-radius: 1.9rem;
      padding: 1.2rem;
      border: 1px solid var(--line);
      background:
        linear-gradient(155deg, var(--card-a), var(--card-b) 56%, var(--surface-strong) 100%);
      box-shadow: var(--shadow);
      animation: lift-in 420ms ease both;
      scroll-margin-top: 9.4rem;
    }

    .day-card::before,
    .day-card::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }

    .day-card::before {
      top: -2.5rem;
      right: -1.75rem;
      width: 11rem;
      height: 11rem;
      border-radius: 50%;
      background: radial-gradient(circle, var(--ambient), transparent 68%);
      opacity: 0.9;
    }

    .day-card::after {
      left: -2rem;
      bottom: -2.5rem;
      width: 10rem;
      height: 10rem;
      border-radius: 50%;
      background: radial-gradient(circle, var(--ambient-two), transparent 68%);
      opacity: 0.72;
    }

    .day-card > * {
      position: relative;
      z-index: 1;
    }

    .day-card.is-focused {
      box-shadow:
        0 0 0 2px rgba(184, 103, 87, 0.2),
        var(--shadow);
    }

    .day-top {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
    }

    .day-label {
      margin: 0;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-deep);
    }

    .day-date {
      margin: 0.28rem 0 0;
      font-size: 1rem;
      color: var(--ink-soft);
      font-weight: 600;
    }

    .day-title {
      margin: 0.55rem 0 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.7rem, 6vw, 2.05rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .day-blurb {
      margin: 0.75rem 0 0;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--ink-soft);
      font-weight: 600;
    }

    .day-crest {
      margin-top: 0.95rem;
      padding: 0.7rem 0.8rem;
      border-radius: 1.35rem;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .day-crest svg {
      display: block;
      width: 100%;
      height: auto;
      color: var(--accent-deep);
    }

    .pacing-pill {
      flex-shrink: 0;
      padding: 0.58rem 0.8rem;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      border: 1px solid currentColor;
      background: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pacing-pill.easy {
      color: var(--easy);
    }

    .pacing-pill.moderate {
      color: var(--moderate);
    }

    .pacing-pill.packed {
      color: var(--packed);
    }

    .day-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-top: 0.95rem;
    }

    .tiny-pill {
      padding: 0.48rem 0.72rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid var(--line);
      font-size: 0.78rem;
      color: var(--ink-soft);
      font-weight: 600;
    }

    .section {
      margin-top: 1.15rem;
      padding: 0.95rem;
      border-radius: 1.35rem;
      background: rgba(255, 255, 255, 0.26);
      border: 1px solid var(--line);
    }

    .section h2,
    .section h3 {
      margin: 0;
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent-deep);
    }

    .anchor-list {
      display: grid;
      gap: 0.75rem;
      margin-top: 0.85rem;
    }

    .anchor-item {
      padding: 0.9rem;
      border-radius: 1.1rem;
      background: rgba(255, 255, 255, 0.36);
      border: 1px solid var(--line);
    }

    .anchor-time {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--locked);
    }

    .anchor-name {
      margin-top: 0.36rem;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .anchor-note,
    .soft-note {
      margin: 0.45rem 0 0;
      font-size: 0.92rem;
      color: var(--ink-soft);
      font-weight: 600;
      line-height: 1.45;
    }

    .moment {
      margin-top: 1.1rem;
    }

    .moment-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.7rem;
    }

    .moment-title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 1.32rem;
      letter-spacing: -0.02em;
    }

    .moment-count {
      font-size: 0.82rem;
      color: var(--ink-soft);
      font-weight: 600;
    }

    .entry-list {
      display: grid;
      gap: 0.8rem;
    }

    details.entry {
      border: 1px solid var(--line);
      border-radius: 1.3rem;
      background: rgba(255, 255, 255, 0.38);
      overflow: hidden;
      transition: transform 180ms ease, background 180ms ease;
    }

    details.entry[open] {
      background: rgba(255, 255, 255, 0.46);
      transform: translateY(-1px);
    }

    details.entry summary {
      list-style: none;
      cursor: pointer;
      padding: 0.95rem;
    }

    details.entry summary::-webkit-details-marker {
      display: none;
    }

    .entry-head {
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
      align-items: flex-start;
    }

    .entry-kicker {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 0.55rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.34rem 0.56rem;
      border-radius: 999px;
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid currentColor;
      background: rgba(255, 255, 255, 0.34);
    }

    .badge.locked {
      color: var(--locked);
    }

    .badge.soft {
      color: var(--soft);
    }

    .badge.floating {
      color: var(--floating);
    }

    .badge.category {
      color: var(--ink-soft);
      text-transform: none;
      letter-spacing: 0.02em;
      font-size: 0.74rem;
      font-weight: 600;
      border-color: var(--line);
    }

    .entry-name {
      margin: 0;
      font-size: 1rem;
      line-height: 1.38;
      font-weight: 700;
      max-width: 15.5rem;
    }

    .entry-time {
      flex-shrink: 0;
      text-align: right;
      font-size: 0.82rem;
      color: var(--ink);
      font-weight: 700;
      line-height: 1.35;
      max-width: 6.8rem;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.42rem;
      margin-top: 0.7rem;
      padding-right: 1.5rem;
    }

    .tag {
      padding: 0.32rem 0.54rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.26);
      border: 1px solid var(--line);
      font-size: 0.72rem;
      color: var(--ink-soft);
      font-weight: 600;
    }

    .chevron {
      margin-left: auto;
      margin-top: 0.45rem;
      width: 1rem;
      height: 1rem;
      border-right: 2px solid var(--ink-soft);
      border-bottom: 2px solid var(--ink-soft);
      transform: rotate(45deg);
      transition: transform 220ms ease;
    }

    details.entry[open] .chevron {
      transform: rotate(225deg);
    }

    .entry-body {
      padding: 0 0.95rem 1rem;
      display: grid;
      gap: 0.7rem;
      color: var(--ink-soft);
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.5;
      animation: bloom 200ms ease;
    }

    .entry-body p {
      margin: 0;
    }

    .map-row {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
    }

    .map-row a {
      text-decoration: none;
      color: var(--accent-deep);
      border: 1px solid rgba(184, 103, 87, 0.22);
      background: rgba(184, 103, 87, 0.08);
      padding: 0.72rem 0.88rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      min-height: 2.75rem;
      display: inline-flex;
      align-items: center;
    }

    .footer-note {
      margin-top: 1rem;
      text-align: center;
      color: var(--ink-soft);
      font-weight: 600;
      font-size: 0.88rem;
      line-height: 1.5;
      padding: 0 0.75rem;
    }

    @media (prefers-color-scheme: dark) {
      .day-card {
        color: #2f241d;
        background:
          linear-gradient(158deg, var(--card-a), var(--card-b) 58%, rgba(235, 223, 216, 0.94) 100%);
        border-color: rgba(114, 85, 71, 0.16);
        box-shadow:
          0 18px 42px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }

      .day-card.is-focused {
        box-shadow:
          0 0 0 2px rgba(190, 117, 92, 0.24),
          0 22px 48px rgba(0, 0, 0, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }

      .day-card .day-crest,
      .day-card .section,
      .day-card .anchor-item,
      .day-card details.entry {
        background:
          linear-gradient(180deg, rgba(255, 252, 248, 0.5), rgba(255, 247, 241, 0.4));
        border-color: rgba(114, 85, 71, 0.14);
      }

      .day-card details.entry[open] {
        background:
          linear-gradient(180deg, rgba(255, 252, 248, 0.62), rgba(255, 247, 241, 0.48));
      }

      .day-card .tiny-pill,
      .day-card .badge,
      .day-card .tag {
        background: rgba(255, 255, 255, 0.32);
        border-color: rgba(114, 85, 71, 0.14);
      }

      .day-card .day-label,
      .day-card .section h2,
      .day-card .section h3,
      .day-card .day-crest svg,
      .day-card .anchor-time,
      .day-card .badge.locked {
        color: #9f6554;
      }

      .day-card .badge.soft {
        color: #7a6250;
      }

      .day-card .badge.floating {
        color: #4f7067;
      }

      .day-card .day-date,
      .day-card .day-blurb,
      .day-card .moment-count,
      .day-card .anchor-note,
      .day-card .soft-note,
      .day-card .tiny-pill,
      .day-card .tag,
      .day-card .entry-body,
      .day-card .badge.category {
        color: #5c4940;
      }

      .day-card .day-title,
      .day-card .anchor-name,
      .day-card .entry-name,
      .day-card .moment-title,
      .day-card .entry-time {
        color: #2f241d;
        text-shadow: none;
      }

      .day-card .chevron {
        border-right-color: #6f5b50;
        border-bottom-color: #6f5b50;
      }

      .day-card .map-row a {
        color: #9a5f4f;
        background: rgba(255, 253, 250, 0.52);
        border-color: rgba(154, 95, 79, 0.22);
      }
    }

    @keyframes lift-in {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bloom {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-panel">
        <p class="eyebrow">Pocket Field Guide</p>
        <h1>DC + Shenandoah</h1>
        <div class="toolbar">
          <button id="todayToggle" type="button" aria-pressed="false">Today</button>

    function parseTimeToken(raw) {
      if (!raw) return null;
      const text = String(raw).trim().toLowerCase();
      if (!text || text === "—") return null;
      if (text === "night") return 21 * 60;

      const meridian = text.includes("am") ? "am" : text.includes("pm") ? "pm" : "";
      const clean = text.replace(/am|pm/g, "").trim();
      const pieces = clean.split(":");
      const hour = Number(pieces[0]);
      const minute = Number(pieces[1] || "0");

      if (!Number.isFinite(hour) || !Number.isFinite(minute)) return null;

      if (meridian) {
        let adjustedHour = hour % 12;
        if (meridian === "pm") adjustedHour += 12;
        return adjustedHour * 60 + minute;
      }

      if (hour === 12) {
        return 12 * 60 + minute;
      }

      return [hour * 60 + minute, (hour + 12) * 60 + minute];
    }

    function resolveTime(raw, previousMinutes) {
      const parsed = parseTimeToken(raw);
      if (parsed == null) return null;
      if (typeof parsed === "number") return parsed;

      const candidates = parsed.slice().sort(function(a, b) {
        return a - b;
      });
      const floor = previousMinutes == null ? -1 : previousMinutes - 30;
      for (let index = 0; index < candidates.length; index += 1) {
        if (candidates[index] >= floor) {
          return candidates[index];
        }
      }
      return candidates[candidates.length - 1];
    }

    function formatMinutes(minutes) {
      if (minutes == null) return "";
      const hour24 = Math.floor(minutes / 60);
      const minute = minutes % 60;
      const meridian = hour24 >= 12 ? "PM" : "AM";
      const hour12 = hour24 % 12 === 0 ? 12 : hour24 % 12;
      return hour12 + ":" + String(minute).padStart(2, "0") + " " + meridian;
    }

    function formatWindow(startMinutes, endMinutes) {
      if (startMinutes != null && endMinutes != null) {
        return formatMinutes(startMinutes) + " - " + formatMinutes(endMinutes);

      if (startMinutes != null) {
        return formatMinutes(startMinutes);
      }
      return "";
    }

      if (minutes == null) return "evening";
      if (minutes < 11 * 60) return "morning";
      if (minutes < 14 * 60) return "midday";
      if (minutes < 17 * 60 + 30) return "afternoon";
      return "evening";

        return accumulator;
      }, {});

      return Object.keys(grouped).map(function(dayKey) {
        const dayNumber = Number(dayKey);
        const rows = augmentDayRows(grouped[dayNumber]);
        const sampleDate = buildDate(rows[0].date);
        const meta = dayMeta[dayNumber];
        const anchors = rows.filter(function(row) {
          return row.timingType === "locked";
        });
        const sections = sectionOrder.reduce(function(accumulator, bucket) {
          const items = rows.filter(function(row) {
            return row.daypart === bucket;
          });
          if (items.length) accumulator[bucket] = items;
          return accumulator;
        }, {});

        return {
          day: dayNumber,
          dateText: sampleDate.toLocaleDateString(undefined, {
            weekday: "long",
            month: "long",
            day: "numeric"
          }),
          shortDate: sampleDate.toLocaleDateString(undefined, {
            month: "short",
            day: "numeric"
          }),
          dateValue: sampleDate,
          dateKey: toDateKey(sampleDate),
          rows: rows,
          anchors: anchors,
          sections: sections,
          title: meta.title,
          blurb: meta.blurb,
          pacing: meta.pacing
        };
      }).sort(function(a, b) {
        return a.dateValue - b.dateValue || a.day - b.day;
      });
    }

    const tripDays = buildDays();
    const tripBounds = {
      start: tripDays[0],
      end: tripDays[tripDays.length - 1]
    };

    function isSameDate(dateA, dateB) {
      return dateA.getFullYear() === dateB.getFullYear() &&
        dateA.getMonth() === dateB.getMonth() &&
        dateA.getDate() === dateB.getDate();
    }

    function getTripPosition() {
      const todayKey = toDateKey(new Date());
      if (todayKey < tripBounds.start.dateKey) return "before";
      if (todayKey > tripBounds.end.dateKey) return "after";
      return "during";
    }

    function getTripDayForToday() {
      const now = new Date();
      const position = getTripPosition();

      if (position === "before") return tripBounds.start;
      if (position === "after") return tripBounds.end;

      for (let index = 0; index < tripDays.length; index += 1) {
        if (isSameDate(now, tripDays[index].dateValue)) return tripDays[index];
      }

      return tripBounds.start;
    }

    function getActiveDay() {
      return tripDays.find(function(day) {
        return day.day === state.activeDay;
      }) || tripDays[0];
    }

    function scrollToDayCard(dayNumber) {
      const card = document.getElementById("day-card-" + dayNumber);
      if (!card) return;
      card.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function applyPalette(theme) {
      document.documentElement.style.setProperty("--accent", theme.accent);
      document.documentElement.style.setProperty("--accent-deep", theme.accentDeep);
      document.documentElement.style.setProperty("--ambient", theme.ambient);
      document.documentElement.style.setProperty("--ambient-two", theme.ambientTwo);
      document.documentElement.style.setProperty("--card-a", theme.cardA);
      document.documentElement.style.setProperty("--card-b", theme.cardB);
    }

    function applyTheme(day) {
      const themeSet = colorSchemeMedia.matches ? darkDayThemes : dayThemes;
      applyPalette(themeSet[day.day] || dayThemes[day.day]);
    }

    function mapLinksHtml(row) {
      if (!shouldShowMap(row)) return "";
      const destination = row.mapQuery || row.address || row.location;
      const query = encodeURIComponent(destination);
      return [
        '<div class="map-row">',
        '<a href="https://maps.apple.com/?q=' + query + '" target="_blank" rel="noreferrer">Apple Maps</a>',
        '<a href="https://www.google.com/maps/search/?api=1&query=' + query + '" target="_blank" rel="noreferrer">Google Maps</a>',
        "</div>"
      ].join("");
    }

    function entryBodyHtml(row) {
      const lines = [];

      if (row.location) {
        lines.push("<p><strong>Place:</strong> " + escapeHtml(row.location) + "</p>");
      }

      if (row.address) {
        lines.push("<p><strong>Address:</strong> " + escapeHtml(row.address) + "</p>");
      }

      if (row.travel) {
        lines.push("<p><strong>Travel feel:</strong> " + escapeHtml(row.travel) + "</p>");
      }

      if (row.notes) {
        lines.push("<p><strong>Field note:</strong> " + escapeHtml(row.notes) + "</p>");
      }

      const originalWindow = getOriginalWindow(row);
      if (originalWindow) {
        lines.push("<p><strong>Original planning window:</strong> ~ " + escapeHtml(originalWindow) + "</p>");
      }

      lines.push(mapLinksHtml(row));
      return lines.join("");
    }

    function renderAnchors(day) {
      if (!day.anchors.length) {
        return [
          '<section class="section">',
          "<h2>Today's anchors</h2>",
          '<p class="soft-note">No hard bookings here. Let weather, energy, and curiosity steer the order.</p>',
          "</section>"
        ].join("");
      }

      return [
        '<section class="section">',
        "<h2>Today's anchors</h2>",
        '<div class="anchor-list">',
        day.anchors.map(function(anchor) {
          return [
            '<div class="anchor-item">',
            '<div class="anchor-time">' + escapeHtml(formatWindow(anchor.startMinutes, anchor.endMinutes)) + "</div>",
            '<div class="anchor-name">' + escapeHtml(anchor.activity) + "</div>",
            anchor.notes ? '<p class="anchor-note">' + escapeHtml(anchor.notes) + "</p>" : "",
            "</div>"
          ].join("");
        }).join(""),
        "</div>",
        "</section>"
      ].join("");
    }

    function renderSections(day) {
      return sectionOrder.map(function(bucket) {
        const items = day.sections[bucket];
        if (!items || !items.length) return "";

        return [
          '<section class="moment">',
          '<div class="moment-header">',
          '<h3 class="moment-title">' + dayLabels[bucket] + "</h3>",
          '<div class="moment-count">' + items.length + " stop" + (items.length === 1 ? "" : "s") + "</div>",
          "</div>",
          '<div class="entry-list">',
          items.map(function(row) {
            return [
              '<details class="entry">',
              "<summary>",
              '<div class="entry-head">',
              "<div>",
              '<div class="entry-kicker">',
              '<span class="badge ' + row.timingType + '">' + escapeHtml(getTimingLabel(row)) + "</span>",
              '<span class="badge category">' + escapeHtml(row.category) + "</span>",
              "</div>",
              '<h4 class="entry-name">' + escapeHtml(row.activity) + "</h4>",
              "</div>",
              '<div class="entry-time">' + escapeHtml(getSummaryTime(row)) + "</div>",
              "</div>",
              '<div class="tag-row">' + row.tags.map(function(tag) {
                return '<span class="tag">' + escapeHtml(tag) + "</span>";
              }).join("") + "</div>",
              '<div class="chevron" aria-hidden="true"></div>',
              "</summary>",
              '<div class="entry-body">' + entryBodyHtml(row) + "</div>",
              "</details>"
            ].join("");
          }).join(""),
          "</div>",
          "</section>"
        ].join("");
      }).join("");
    }

    function renderStatus() {
      const statusNote = document.getElementById("statusNote");
      const todayDay = getTripDayForToday();
      const position = getTripPosition();

      if (state.viewMode === "today" && position === "during") {
        statusNote.textContent = "Today mode is centered on Day " + todayDay.day + ". This is the live day card for the trip.";
        return;
      }

      if (state.viewMode === "today" && position === "before") {
        statusNote.textContent = "The trip has not started yet, so Today defaults to Day 1. The first date in the CSV is " + tripBounds.start.dateText + ".";
        return;
      }

      if (state.viewMode === "today" && position === "after") {
        statusNote.textContent = "The trip window has passed, so Today rests on the last day. It keeps the ending easy to revisit.";
        return;
      }

      if (state.viewMode === "single") {
        statusNote.textContent = "Showing Day " + state.activeDay + " on its own. Use the dots to hop days, or tap Browse All Days for the full journal.";
        return;
      }

      statusNote.textContent = "Browse All Days is open. Use the dots to hop around, or simply scroll the whole guide like a little travel journal.";
    }

    function renderDots() {
      const container = document.getElementById("dayDots");
      container.innerHTML = tripDays.map(function(day) {
        const current = day.day === state.activeDay;
        return [
          '<button class="dot-button ' + (current ? "is-current" : "") + '" type="button" data-day="' + day.day + '" aria-label="Open Day ' + day.day + ", " + escapeHtml(day.shortDate) + '">',
          '<div class="dot-core"></div>',
          "<span>Day " + day.day + "</span>",
          "<span>" + escapeHtml(day.shortDate) + "</span>",
          "</button>"
        ].join("");
      }).join("");

      Array.prototype.forEach.call(container.querySelectorAll(".dot-button"), function(button) {
        button.addEventListener("click", function() {
          const selectedDay = Number(button.getAttribute("data-day"));
          state.activeDay = selectedDay;
          state.viewMode = "single";
          render();
        });
      });
    }

    function renderDayCrest(dayNumber) {
      const scenes = {
        1: [
          '<svg viewBox="0 0 320 92" fill="none" xmlns="http://www.w3.org/2000/svg">',
          '<path d="M14 72c24-10 39-14 61-14 22 0 34 6 49 6 18 0 30-11 52-11 23 0 36 11 55 11 18 0 34-8 75-14" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" opacity=".28"/>',
          '<path d="M92 70h18l-6-36h-6l-6 36z" fill="currentColor" opacity=".82"/>',
          '<path d="M101 24l9 12H92l9-12z" fill="currentColor"/>',
          '<path d="M176 26h12v44h-12z" fill="currentColor" opacity=".78"/>',
          '<path d="M164 70h36" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>',
          '<path d="M228 56c10-7 21-11 31-11 11 0 19 6 32 17" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>',
          '<circle cx="270" cy="22" r="8" fill="currentColor" opacity=".16"/>',
          '</svg>'
        ].join(""),
        2: [
          '<svg viewBox="0 0 320 92" fill="none" xmlns="http://www.w3.org/2000/svg">',
          '<path d="M18 71h284" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" opacity=".2"/>',
          '<path d="M62 70h64" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>',
          '<path d="M72 70V48m14 22V48m14 22V48m14 22V48" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity=".78"/>',
          '<path d="M59 48h69l-34.5-18L59 48z" fill="currentColor"/>',
          '<path d="M156 50l40-15-16 18 13 8-9 2-12-7-11 13-7-3 8-11-26-1z" fill="currentColor"/>',
          '<path d="M212 68h58l-9-26h-40l-9 26z" fill="currentColor" opacity=".2"/>',
          '<path d="M223 42h36" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>',
          '<path d="M232 33h18" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>',
          '<circle cx="287" cy="20" r="7" fill="currentColor" opacity=".14"/>',
          '</svg>'
        ].join(""),
        3: [
          '<svg viewBox="0 0 320 92" fill="none" xmlns="http://www.w3.org/2000/svg">',
          '<path d="M20 70c29-8 47-8 65-2 14 5 27 5 41 0 18-6 22-28 39-28 19 0 30 28 44 28 12 0 22-7 37-20 13-12 28-20 54-25" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>',
          '<path d="M35 73V45h33v28" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>',
          '<path d="M49 45V33l9-6 10 6v12" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>',
          '<path d="M82 58h56" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity=".3"/>',
          '<circle cx="250" cy="22" r="9" fill="currentColor" opacity=".16"/>',
          '</svg>'
        ].join(""),
        4: [
          '<svg viewBox="0 0 320 92" fill="none" xmlns="http://www.w3.org/2000/svg">',
          '<path d="M18 67c24 6 42 7 66 4 24-3 47-12 75-12 31 0 53 12 79 12 22 0 40-4 64-14" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" opacity=".25"/>',
          '<path d="M88 56c10 0 23 5 34 5 12 0 23-5 34-5-9 9-16 14-34 14s-25-5-34-14z" fill="currentColor"/>',
          '<path d="M121 56l-4-11m13 11l4-11" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>',
          '<path d="M208 67c0-19 16-34 36-34s36 15 36 34" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity=".3"/>',
          '<path d="M224 67c0-10 9-18 20-18s20 8 20 18" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>',
          '<path d="M42 67V40m12 27V33m12 34V45" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity=".78"/>',
          '</svg>'
        ].join(""),
        5: [
          '<svg viewBox="0 0 320 92" fill="none" xmlns="http://www.w3.org/2000/svg">',
          '<path d="M18 72c28-10 45-15 71-15 28 0 47 13 71 13 19 0 32-10 46-20 13-10 27-17 57-22" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" opacity=".3"/>',
          '<path d="M58 70V47h34v23" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>',
          '<path d="M53 49l22-15 22 15" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>',
          '<path d="M184 69c16-1 25-8 41-23 14-14 24-22 44-27" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>',
          '<path d="M250 26l17 5-11 11" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>',
          '<circle cx="287" cy="21" r="7" fill="currentColor" opacity=".15"/>',
          '</svg>'
        ].join("")
      };

      return scenes[dayNumber] || scenes[1];
    }

    function renderDayCard(day, isFocused) {
      return [
        '<article class="day-card' + (isFocused ? " is-focused" : "") + '" id="day-card-' + day.day + '">',
        '<div class="day-top">',
        "<div>",
        '<p class="day-label">Day ' + day.day + "</p>",
        '<p class="day-date">' + escapeHtml(day.dateText) + "</p>",
        '<h2 class="day-title">' + escapeHtml(day.title) + "</h2>",
        "</div>",
        '<div class="pacing-pill ' + day.pacing.toLowerCase() + '">' + escapeHtml(day.pacing) + "</div>",
        "</div>",
        '<p class="day-blurb">' + escapeHtml(day.blurb) + "</p>",
        '<div class="day-crest" aria-hidden="true">' + renderDayCrest(day.day) + "</div>",
        '<div class="day-meta">',
        "<span class=\"tiny-pill\">" + day.rows.length + " moments</span>",
        "<span class=\"tiny-pill\">" + day.anchors.length + " anchor" + (day.anchors.length === 1 ? "" : "s") + "</span>",
        '<span class="tiny-pill">Most times are approximate</span>',
        "</div>",
        renderAnchors(day),
        renderSections(day),
        "</article>"
      ].join("");
    }

    function renderGuide() {
      const guide = document.getElementById("guide");
      const activeDay = getActiveDay();

      if (state.viewMode !== "browse") {
        guide.className = "guide";
        guide.innerHTML = renderDayCard(activeDay, true);
        applyTheme(activeDay);
        return;
      }

      guide.className = "guide is-browse";
      guide.innerHTML = tripDays.map(function(day) {
        return renderDayCard(day, day.day === activeDay.day);
      }).join("");

      applyTheme(activeDay);
    }

    function syncModeToggle() {
      const todayButton = document.getElementById("todayToggle");
      const browseButton = document.getElementById("browseToggle");

      todayButton.classList.toggle("is-active", state.viewMode === "today");
      todayButton.setAttribute("aria-pressed", state.viewMode === "today" ? "true" : "false");

      browseButton.classList.toggle("is-active", state.viewMode === "browse");
      browseButton.setAttribute("aria-pressed", state.viewMode === "browse" ? "true" : "false");
    }

    function render() {
      syncModeToggle();
      renderStatus();
      renderDots();
      renderGuide();
    }

    document.getElementById("todayToggle").addEventListener("click", function() {
      state.viewMode = "today";
      state.activeDay = getTripDayForToday().day;
      render();
    });

    document.getElementById("browseToggle").addEventListener("click", function() {
      state.viewMode = "browse";
      render();
      scrollToDayCard(state.activeDay);
    });

    if (typeof colorSchemeMedia.addEventListener === "function") {
      colorSchemeMedia.addEventListener("change", render);
    } else if (typeof colorSchemeMedia.addListener === "function") {
      colorSchemeMedia.addListener(render);
    }

    (function init() {
      state.activeDay = getTripDayForToday().day;
      state.viewMode = "today";
      render();
    })();
  </script>
</body>
</html>
